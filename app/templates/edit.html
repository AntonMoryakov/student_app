<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать студента</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
    <div class="page">
        <section class="form-card">
            <div class="form-header">
                <p class="hero-badge">Редактирование записи</p>
                <h1>Редактировать студента</h1>
                <p class="hero-text">Измените нужные поля и сохраните обновленные данные.</p>
            </div>

            {% if error %}
            <div class="alert alert-error">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/students/edit/{{ student.id }}" class="student-form">
                <div class="form-group">
                    <label for="name">Имя</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        value="{{ student.name }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="age">Возраст</label>
                    <input
                        type="number"
                        id="age"
                        name="age"
                        min="14"
                        max="120"
                        value="{{ student.age }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="group_name">Группа</label>
                    <input
                        type="text"
                        id="group_name"
                        name="group_name"
                        value="{{ student.group_name }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="gender">Пол</label>
                    <select id="gender" name="gender" required>
                        <option value="М" {% if student.gender == "М" %}selected{% endif %}>М</option>
                        <option value="Ж" {% if student.gender == "Ж" %}selected{% endif %}>Ж</option>
                    </select>
                </div>

                <div class="form-actions">
                    <a class="btn btn-secondary" href="/">Назад</a>
                    <button class="btn btn-primary" type="submit">Сохранить изменения</button>
                </div>
            </form>
        </section>
    </div>
</body>
</html>

version: "3.8"

services:
  db:
    image: postgres:16
    container_name: student_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student_app
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  node1:
    build:
      context: ./node_app
      dockerfile: Dockerfile
    container_name: node1
    restart: unless-stopped
    environment:
      NODE_NAME: "Нода 1"
    expose:
      - "8000"

  node2:
    build:
      context: ./node_app
      dockerfile: Dockerfile
    container_name: node2
    restart: unless-stopped
    environment:
      NODE_NAME: "Нода 2"
    expose:
      - "8000"

  node3:
    build:
      context: ./node_app
      dockerfile: Dockerfile
    container_name: node3
    restart: unless-stopped
    environment:
      NODE_NAME: "Нода 3"
    expose:
      - "8000"

  nginx:
    image: nginx:stable-alpine
    container_name: nginx_lb
    restart: unless-stopped
    depends_on:
      - node1
      - node2
      - node3
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"

volumes:
  postgres_data:
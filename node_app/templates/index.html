<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Идентификатор ноды</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(59, 130, 246, 0.22), transparent 35%),
                radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.18), transparent 35%),
                linear-gradient(160deg, #0f172a 0%, #111827 55%, #0b1120 100%);
            color: #f8fafc;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 640px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 28px;
            padding: 40px 32px;
            backdrop-filter: blur(18px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            text-align: center;
        }

        .badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(59, 130, 246, 0.16);
            border: 1px solid rgba(96, 165, 250, 0.25);
            color: #bfdbfe;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 18px;
        }

        h1 {
            margin: 0 0 14px;
            font-size: 2.4rem;
            line-height: 1.1;
        }

        .subtitle {
            margin: 0 0 28px;
            color: #cbd5e1;
            font-size: 1.02rem;
            line-height: 1.6;
        }

        .node-box {
            margin: 0 auto 18px;
            padding: 22px;
            border-radius: 20px;
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .node-label {
            margin: 0 0 8px;
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .node-name {
            margin: 0;
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
        }

        .meta {
            margin-top: 18px;
            color: #cbd5e1;
            font-size: 0.96rem;
        }

        .meta strong {
            color: #ffffff;
        }

        @media (max-width: 640px) {
            .card {
                padding: 28px 20px;
                border-radius: 22px;
            }

            h1 {
                font-size: 1.9rem;
            }

            .node-name {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">Лабораторная работа №4</div>
        <h1>Определение активной ноды</h1>
        <p class="subtitle">
            Эта страница показывает, какой backend-контейнер обработал текущий запрос через балансировщик Nginx.
        </p>

        <div class="node-box">
            <p class="node-label">Текущая нода</p>
            <p class="node-name">{{ node_name }}</p>
        </div>

        <p class="meta">
            Имя контейнера / host: <strong>{{ hostname }}</strong>
        </p>
    </div>
</body>
</html>
